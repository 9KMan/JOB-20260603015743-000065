version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/support_bot
      - DEBUG=false
      - SECRET_KEY=change-me-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - USE_PGVECTOR=true
    depends_on:
      - db
    networks:
      - support-bot-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - api
    networks:
      - support-bot-network
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=support_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - support-bot-network
    restart: unless-stopped

  # Optional: Redis for caching and background jobs
  redis:
    image: redis:7-alpine
    networks:
      - support-bot-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  support-bot-network:
    driver: bridge